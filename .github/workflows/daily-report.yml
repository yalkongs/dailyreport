name: Generate Daily Market Report
# Runs at 06:30 KST on weekdays. Two sequential jobs:
#   1. `market` — global market report (existing pipeline)
#   2. `etf`    — ETF morning report (absorbed from etfreport)
# The jobs are independent: if `market` fails, `etf` still runs.
# Only the ordering is preserved so Telegram pushes arrive in a
# predictable order (market first, then ETF).

on:
  schedule:
    # KST 06:30 (월~금) = UTC 21:30 (일~목)
    - cron: '30 21 * * 0-4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '테스트 실행 (텔레그램 발송 안 함, commit 안 함)'
        required: false
        type: boolean
        default: false
      force_regenerate:
        description: '오늘 자 리포트가 이미 있어도 강제 재생성'
        required: false
        type: boolean
        default: false
      only:
        description: '실행 대상 (market | etf | both)'
        required: false
        type: choice
        options: [both, market, etf]
        default: both
      resend_telegram_only:
        description: '오늘 자 기존 리포트로 Telegram만 재발송 (생성 스킵)'
        required: false
        type: boolean
        default: false

env:
  TZ: Asia/Seoul

permissions:
  contents: write

jobs:
  market:
    if: ${{ inputs.only != 'etf' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Korean fonts (runner has no CJK fonts by default)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          fc-cache -f
          fc-list :lang=ko | head -3

      - name: Generate market report
        id: report
        if: ${{ inputs.resend_telegram_only != true && inputs.resend_telegram_only != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          DISABLE_CONTEXT: ${{ (inputs.dry_run == true || inputs.dry_run == 'true') && 'false' || 'false' }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate == true && 'true' || 'false' }}
        run: |
          npx tsx scripts/run.ts
          REPORT_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "date=${REPORT_DATE}" >> $GITHUB_OUTPUT
          # reports-index.json에서 헤드라인 추출
          HEADLINE=$(node -e "const i=JSON.parse(require('fs').readFileSync('data/reports-index.json','utf-8'));const r=i.reports.find(r=>r.date==='${REPORT_DATE}');console.log(r?.headline||'오늘의 시장 리포트')")
          echo "headline=${HEADLINE}" >> $GITHUB_OUTPUT

      - name: Read today's market headline (resend mode)
        id: read_today
        if: ${{ inputs.resend_telegram_only == true || inputs.resend_telegram_only == 'true' }}
        run: |
          REPORT_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "date=${REPORT_DATE}" >> $GITHUB_OUTPUT
          HEADLINE=$(node -e "const i=JSON.parse(require('fs').readFileSync('data/reports-index.json','utf-8'));const r=i.reports.find(r=>r.date==='${REPORT_DATE}');console.log(r?.headline||'오늘의 시장 리포트')")
          echo "headline=${HEADLINE}" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        if: ${{ inputs.resend_telegram_only != true && inputs.resend_telegram_only != 'true' }}
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push report
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORT_DATE=${{ steps.report.outputs.date }}
          git add public/reports/ data/
          git commit -m "Daily Market Report - ${REPORT_DATE} (KST)"
          git push

      - name: Wait for Vercel deployment
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true && inputs.dry_run != 'true'
        run: sleep 60

      - name: Send Telegram notification
        if: ${{ (inputs.resend_telegram_only == true || inputs.resend_telegram_only == 'true') || (steps.changes.outputs.changed == 'true' && inputs.dry_run != true && inputs.dry_run != 'true') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -x
          REPORT_DATE="${{ steps.report.outputs.date || steps.read_today.outputs.date }}"
          HEADLINE="${{ steps.report.outputs.headline || steps.read_today.outputs.headline }}"
          REPORT_URL="https://dailyreport-eta.vercel.app/reports/${REPORT_DATE}"
          OG_IMAGE_URL="https://dailyreport-eta.vercel.app/reports/${REPORT_DATE}-preview.png"

          # 날짜 포맷 (예: 4월 13일 월요일)
          FORMATTED_DATE=$(TZ=Asia/Seoul date +"%m월 %d일 %A" | sed 's/Monday/월요일/;s/Tuesday/화요일/;s/Wednesday/수요일/;s/Thursday/목요일/;s/Friday/금요일/')

          MESSAGE=$(printf '<b>iM AI Market Report</b>\n\n<b>%s</b>\n\n%s\n\n<a href="%s">리포트 보기</a>' "$HEADLINE" "$FORMATTED_DATE" "$REPORT_URL")

          # --form-string: value는 리터럴로 처리 (caption이 '<'로 시작하면
          # -F는 "파일에서 읽기"로 오해해 exit 26 낸다. 이모지 제거로 노출됨)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
            --form-string "photo=${OG_IMAGE_URL}" \
            --form-string "caption=${MESSAGE}" \
            --form-string "parse_mode=HTML"

  etf:
    needs: market
    if: ${{ always() && inputs.only != 'market' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Korean fonts (runner has no CJK fonts by default)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          fc-cache -f

      - name: Run ETF pipeline
        id: etf
        if: ${{ inputs.resend_telegram_only != true && inputs.resend_telegram_only != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
          ETF_PUBLIC_BASE_URL: https://dailyreport-eta.vercel.app
        run: |
          npx tsx scripts/run-etf.ts
          REPORT_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "date=${REPORT_DATE}" >> $GITHUB_OUTPUT
          HEADLINE=$(node -e "const i=JSON.parse(require('fs').readFileSync('data/etf-reports-index.json','utf-8'));const r=i.reports.find(r=>r.date==='${REPORT_DATE}');console.log(r?.headline||'오늘의 ETF 리포트')")
          ANOMALY_COUNT=$(node -e "const i=JSON.parse(require('fs').readFileSync('data/etf-reports-index.json','utf-8'));const r=i.reports.find(r=>r.date==='${REPORT_DATE}');console.log(r?.anomalyCount||0)")
          echo "headline=${HEADLINE}" >> $GITHUB_OUTPUT
          echo "anomaly_count=${ANOMALY_COUNT}" >> $GITHUB_OUTPUT

      - name: Read today's ETF headline (resend mode)
        id: read_etf_today
        if: ${{ inputs.resend_telegram_only == true || inputs.resend_telegram_only == 'true' }}
        run: |
          REPORT_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "date=${REPORT_DATE}" >> $GITHUB_OUTPUT
          HEADLINE=$(node -e "const i=JSON.parse(require('fs').readFileSync('data/etf-reports-index.json','utf-8'));const r=i.reports.find(r=>r.date==='${REPORT_DATE}');console.log(r?.headline||'오늘의 ETF 리포트')")
          ANOMALY_COUNT=$(node -e "const i=JSON.parse(require('fs').readFileSync('data/etf-reports-index.json','utf-8'));const r=i.reports.find(r=>r.date==='${REPORT_DATE}');console.log(r?.anomalyCount||0)")
          echo "headline=${HEADLINE}" >> $GITHUB_OUTPUT
          echo "anomaly_count=${ANOMALY_COUNT}" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        if: ${{ inputs.resend_telegram_only != true && inputs.resend_telegram_only != 'true' }}
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push ETF report
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true && inputs.dry_run != 'true'
        run: |
          # Pull any market-job commit that landed during this run so we
          # don't race-fail on push.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          REPORT_DATE=${{ steps.etf.outputs.date }}
          git add public/etf-reports/ data/
          git commit -m "ETF Daily Report - ${REPORT_DATE} (KST)"
          git push

      - name: Wait for Vercel deployment
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true && inputs.dry_run != 'true'
        run: sleep 60

      - name: Send ETF Telegram notification
        if: ${{ (inputs.resend_telegram_only == true || inputs.resend_telegram_only == 'true') || (steps.changes.outputs.changed == 'true' && inputs.dry_run != true && inputs.dry_run != 'true') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -x
          REPORT_DATE="${{ steps.etf.outputs.date || steps.read_etf_today.outputs.date }}"
          HEADLINE="${{ steps.etf.outputs.headline || steps.read_etf_today.outputs.headline }}"
          ANOMALY_COUNT="${{ steps.etf.outputs.anomaly_count || steps.read_etf_today.outputs.anomaly_count }}"
          REPORT_URL="https://dailyreport-eta.vercel.app/etf-reports/${REPORT_DATE}"

          # 날짜 포맷 (예: 4월 20일 월요일)
          FORMATTED_DATE=$(TZ=Asia/Seoul date +"%m월 %d일 %A" | sed 's/Monday/월요일/;s/Tuesday/화요일/;s/Wednesday/수요일/;s/Thursday/목요일/;s/Friday/금요일/')

          # 이상 탐지 알림 라인 (0건이면 생략)
          ALERT_LINE=""
          if [ "${ANOMALY_COUNT}" -gt 0 ] 2>/dev/null; then
            ALERT_LINE=$'\n이상 탐지: '"${ANOMALY_COUNT}"'건'
          fi

          MESSAGE=$(printf '<b>iM AI ETF Report</b>\n\n<b>%s</b>%s\n\n%s\n\n<a href="%s">리포트 보기</a>' "$HEADLINE" "$ALERT_LINE" "$FORMATTED_DATE" "$REPORT_URL")

          # Static preview PNG generated by scripts/run-etf.ts. We attach
          # it explicitly via sendPhoto so Telegram's preview cache trap
          # (cached "no preview" on first 404) cannot strike.
          OG_IMAGE_URL="https://dailyreport-eta.vercel.app/etf-reports/${REPORT_DATE}-preview.png"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
            --form-string "photo=${OG_IMAGE_URL}" \
            --form-string "caption=${MESSAGE}" \
            --form-string "parse_mode=HTML"
