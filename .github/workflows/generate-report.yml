name: Generate Daily Market Report

on:
  schedule:
    # UTC 22:00 = KST 07:00 다음날
    # 일~목(UTC) 실행 = 한국 기준 월~금 오전 7시
    - cron: '0 22 * * 0-4'
  workflow_dispatch: {} # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate market report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/run.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push report
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORT_DATE=$(date -u -d '+9 hours' +%Y-%m-%d 2>/dev/null || date -u -v+9H +%Y-%m-%d)
          git add public/reports/ data/reports-index.json
          git commit -m "📊 Daily Market Report - ${REPORT_DATE}"
          git push
