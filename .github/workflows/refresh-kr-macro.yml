name: Refresh KR Macro Calendar

# Phase F1 (2026-05-24): 주간 한국 매크로 캘린더 자동 갱신.
# Anthropic web_search 로 향후 14일간 한국 주요 매크로 일정 검색해
# data/kr-macro-calendar.json 캐시 갱신. 일일 Market 파이프라인이 이걸 읽음.
#
# 일요일 14:00 UTC (= 일요일 23:00 KST) 발화 — 월요일 06:30 KST daily-report
# cron 보다 7시간 30분 전에 완료되어 race condition 없음.
#
# 실패 시 일일 파이프라인은 기존 캐시(또는 빈 배열)로 graceful fallback.

on:
  schedule:
    - cron: "0 14 * * 0"  # 일요일 14:00 UTC = 일요일 23:00 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY RUN (JSON 미저장, 출력만)"
        required: false
        type: boolean
        default: false

env:
  TZ: Asia/Seoul

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Refresh KR macro calendar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KR_MACRO_DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
        run: npx tsx scripts/refresh-kr-macro.ts

      - name: Check changes
        if: ${{ inputs.dry_run != true }}
        id: changes
        run: |
          if git diff --quiet data/kr-macro-calendar.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: ${{ inputs.dry_run != true && steps.changes.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kr-macro-calendar.json
          git commit -m "Refresh KR macro calendar — $(date -u +%Y-%m-%d) (weekly auto)"
          git push
